services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.0.0
    platform: linux/amd64 # no arm64 version available
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Zookeeper"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  kafka:
    image: confluentinc/cp-kafka:7.0.0
    platform: linux/amd64 # no arm64 version available
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 60s

  kafka-init:
    image: confluentinc/cp-kafka:7.0.0
    platform: linux/amd64
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/kafka-init/init-kafka-topics.sh:/init-kafka-topics.sh:ro
    command: ["bash", "/init-kafka-topics.sh"]
    restart: "no"

  kafdrop: # Kafka Web UI
    image: obsidiandynamics/kafdrop
    ports:
      - "9033:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
    depends_on:
      - kafka

  spark-master:
    image: spark:3.5.3-scala2.12-java17-python3-ubuntu
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./src:/opt/spark/app/src:ro
      - ivy2-cache:/tmp/ivy2

  spark-worker:
    image: spark:3.5.3-scala2.12-java17-python3-ubuntu
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=1
      - SPARK_NO_DAEMONIZE=true
    depends_on:
      - spark-master
    volumes:
      - ./src:/opt/spark/app/src:ro
      - ivy2-cache:/tmp/ivy2

  streaming-job:
    image: spark:3.5.3-scala2.12-java17-python3-ubuntu
    command: ["bash", "-c", "echo 'Waiting for S3 buckets...' && until curl -sf http://localstack:4566/_localstack/init/ready | grep -q SUCCESSFUL; do echo 'Init scripts not done yet...' && sleep 5; done && echo 'S3 buckets ready, starting streaming job...' && /opt/spark/bin/spark-submit --master spark://spark-master:7077 --name ClickstreamStreaming --conf spark.driver.extraJavaOptions=-Divy.home=/tmp/ivy2 --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,io.delta:delta-spark_2.12:3.2.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262 /opt/spark/app/src/streaming/streaming_job.py"]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - S3_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - SPARK_NO_DAEMONIZE=true
    depends_on:
      kafka:
        condition: service_healthy
      localstack:
        condition: service_healthy
      spark-master:
        condition: service_started
    volumes:
      - ./src:/opt/spark/app/src:ro
      - ivy2-cache:/tmp/ivy2

  producer:
    build:
      context: ./docker/producer
    command: python /app/producer.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./src/producer:/app:ro
    restart: on-failure

  airflow:
    image: apache/airflow:2.3.0
    command: >
      bash -c "airflow db init && (airflow users delete --username admin || true) && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com && airflow standalone"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/dags/src
      - ./dbt:/opt/airflow/dags/dbt
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  trino: # Authentication is not enabled
    image: trinodb/trino:380
    ports:
      - "8082:8080"
    volumes:
      - ./config/trino:/etc/trino

  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - DEBUG=0
      - SERVICES=s3,redshift
    volumes:
      - "localstack-volume:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./scripts/localstack-init:/etc/localstack/init/ready.d"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-db-volume:
  localstack-volume:
  ivy2-cache:
