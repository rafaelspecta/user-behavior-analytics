services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1 # multi-arch (amd64 + arm64)
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Zookeeper"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  kafka:
    image: confluentinc/cp-kafka:7.6.1 # multi-arch (amd64 + arm64)
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 60s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1 # multi-arch (amd64 + arm64)
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./scripts/kafka-init/init-kafka-topics.sh:/init-kafka-topics.sh:ro
    command: ["bash", "/init-kafka-topics.sh"]
    restart: "no"

  kafdrop: # Kafka Web UI
    image: obsidiandynamics/kafdrop
    ports:
      - "9033:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:29092"
    depends_on:
      - kafka

  spark-master:
    image: spark:3.5.3-scala2.12-java17-python3-ubuntu
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    environment:
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      # Hostname used when Spark generates URLs in the UI (e.g. "Back
      # to Master" links on worker and driver pages). Without this,
      # Spark emits the container's internal hostname (like
      # "8c5800c20758:8080") which the host browser can't resolve.
      - SPARK_PUBLIC_DNS=localhost
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./src:/opt/spark/app/src:ro
      - ivy2-cache:/tmp/ivy2
    depends_on:
      ivy2-cache-init:
        condition: service_completed_successfully

  spark-worker:
    image: spark:3.5.3-scala2.12-java17-python3-ubuntu
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      # 2 cores + 2G RAM so streaming and batch can co-exist on the cluster.
      # With only 1 core, the long-lived streaming app holds it forever and any
      # batch spark-submit waits indefinitely with:
      #   WARN TaskSchedulerImpl: Initial job has not accepted any resources
      # Streaming is capped at 1 core via spark.cores.max=1 on its submit so
      # the second core is always available for ad-hoc batch runs.
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      # Port alignment: same port inside the container and on the host
      # so that SPARK_PUBLIC_DNS=localhost produces a usable URL
      # (http://localhost:8083) in the Spark Master UI's Workers list.
      - SPARK_WORKER_WEBUI_PORT=8083
      - SPARK_PUBLIC_DNS=localhost
      - SPARK_NO_DAEMONIZE=true
    ports:
      - "8083:8083"
    depends_on:
      spark-master:
        condition: service_started
      ivy2-cache-init:
        condition: service_completed_successfully
    volumes:
      - ./src:/opt/spark/app/src:ro
      - ivy2-cache:/tmp/ivy2

  streaming-job:
    # Pipeline worker -- runs in BOTH architectures. Architecture A relies on
    # it as the standalone streaming driver. Architecture B keeps it running
    # the same way, with Airflow supervising via clickstream_streaming_supervisor.
    profiles: [streaming-first, airflow-orchestrated]
    image: spark:3.5.3-scala2.12-java17-python3-ubuntu
    # Resource caps on the streaming submit:
    # - spark.cores.max=1       so streaming holds exactly 1 of the worker's
    #                           2 cores, leaving the other free for batch.
    # - spark.executor.memory=512m  keeps two executors (streaming + batch)
    #                           fitting comfortably inside the 2G worker.
    command: ["bash", "-c", "echo 'Waiting for S3 buckets...' && until curl -sf http://localstack:4566/_localstack/init/ready | grep -q SUCCESSFUL; do echo 'Init scripts not done yet...' && sleep 5; done && echo 'S3 buckets ready, starting streaming job...' && /opt/spark/bin/spark-submit --master spark://spark-master:7077 --name ClickstreamStreaming --conf spark.driver.extraJavaOptions=-Divy.home=/tmp/ivy2 --conf spark.cores.max=1 --conf spark.executor.memory=512m --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.3,io.delta:delta-spark_2.12:3.2.0,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262 /opt/spark/app/src/streaming/streaming_job.py"]
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - S3_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      # Makes the driver's per-app UI URL (linked from the Spark
      # Master UI's "Running Applications" list) resolve as
      # http://localhost:4040 instead of the container's internal
      # hostname. Requires the 4040:4040 port mapping below.
      - SPARK_PUBLIC_DNS=localhost
      - SPARK_NO_DAEMONIZE=true
    ports:
      # Driver (per-application) Spark UI. Shows stages, executors,
      # and the Structured Streaming tab for ClickstreamStreaming.
      - "4040:4040"
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
      spark-master:
        condition: service_started
      ivy2-cache-init:
        condition: service_completed_successfully
    volumes:
      - ./src:/opt/spark/app/src:ro
      - ivy2-cache:/tmp/ivy2
    # Self-heal on transient driver failures (e.g. S3A retries, Kafka
    # reconnects). In Architecture B this is complemented by the
    # clickstream_streaming_supervisor DAG, which restarts the
    # container if the Spark app is missing from the master.
    restart: on-failure

  producer:
    # Continuous event source -- runs in BOTH architectures.
    profiles: [streaming-first, airflow-orchestrated]
    build:
      context: ./docker/producer
    command: python /app/producer.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - PYTHONUNBUFFERED=1
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    volumes:
      - ./src/producer:/app:ro
    restart: on-failure

  airflow:
    # Only starts under the airflow-orchestrated profile. In streaming-first
    # mode Airflow is not running (and not required).
    profiles: [airflow-orchestrated]
    build: ./docker/airflow
    command: >
      bash -c "airflow db migrate && airflow standalone"
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__FERNET_KEY=46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLbfzqDDho=
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=true
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS=true
      # Env used by Airflow-launched spark-submit (batch DAG) and by PythonOperators
      # in the supervision DAG. Mirrors the vars set on streaming-job/producer.
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - S3_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AIRFLOW_CONN_SPARK_DEFAULT=spark://spark-master:7077
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/dags/src
      - ./dbt:/opt/airflow/dags/dbt
      # Shared Maven-dependency cache. Without this the Airflow-launched
      # spark-submit re-downloads ~200MB of JARs on every run.
      - ivy2-cache:/tmp/ivy2
      # Docker Engine socket. The streaming supervision DAG uses this to
      # restart the streaming-job container when the Spark app has died.
      # On Linux hosts where the docker group GID is not 999, override with
      # `group_add: ["<gid>"]` here (see docs/troubleshooting.md).
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8080"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_started
      localstack:
        condition: service_healthy
      ivy2-cache-init:
        condition: service_completed_successfully

  # One-shot helper: ensures the shared ivy2-cache volume is world-writable so
  # both uid 185 (Spark containers) and uid 50000 (Airflow) can write to it.
  # Replaces the manual `docker run --rm ...` workaround from docs/troubleshooting.md.
  ivy2-cache-init:
    image: busybox:1.36
    command: ["sh", "-c", "chmod -R 777 /tmp/ivy2 && echo 'ivy2-cache perms OK'"]
    volumes:
      - ivy2-cache:/tmp/ivy2
    restart: "no"

  postgres:
    image: postgres:13
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  trino: # Authentication is not enabled
    # Reserved for Scenario 2 (Trino + dbt). Kept out of the default stack
    # so it does not consume resources until a student opts in.
    profiles: [trino]
    image: trinodb/trino:380
    ports:
      - "8082:8080"
    volumes:
      - ./config/trino:/etc/trino

  localstack:
    image: localstack/localstack:3.8
    ports:
      - "4566:4566"
      - "4510-4559:4510-4559"
    environment:
      - DEBUG=0
      - SERVICES=s3,redshift
    volumes:
      - "localstack-volume:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./scripts/localstack-init:/etc/localstack/init/ready.d"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\"'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres-db-volume:
  localstack-volume:
  ivy2-cache:
