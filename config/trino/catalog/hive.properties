connector.name=hive
hive.metastore.uri=thrift://hive-metastore:9083
hive.s3.aws-access-key=your-access-key
hive.s3.aws-secret-key=your-secret-key
hive.s3.endpoint=https://s3.amazonaws.com
hive.s3.path-style-access=true
hive.s3.ssl.enabled=true
hive.s3.max-error-retries=10
hive.s3.max-connections=500
hive.s3.max-client-retries=10
hive.s3.max-backoff-time=10m
hive.s3.connect-timeout=5s
hive.s3.socket-timeout=5s
hive.s3.staging-directory=/tmp/trino-s3-staging
hive.s3.streaming.enabled=true
hive.s3.streaming.part-size=16MB
hive.s3.streaming.max-connections=500
hive.s3.streaming.max-error-retries=10
hive.s3.streaming.max-backoff-time=10m
hive.s3.streaming.connect-timeout=5s
hive.s3.streaming.socket-timeout=5s
hive.s3.streaming.staging-directory=/tmp/trino-s3-streaming-staging 